name: Automated ETL Data Pipeline

on:
  push:
    branches: [ main ]
    # The pipeline will ONLY trigger if files in these paths are changed
    paths:
      - 'scripts/run_etl.py'
      - 'loaders/typo_behavior_loader.py'
      - 'documents/*.csv'
      - 'documents/*.txt'
  # Still allows manual clicking from the GitHub website
  workflow_dispatch:

jobs:
  crunch-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Data Science Libraries
        run: |
          pip install pandas pyarrow fastparquet scipy streamlit

      - name: Run ETL Script
        env:
          PYTHONPATH: .
        run: python scripts/run_etl.py

      - name: Commit Processed Data Back to Repo
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action ETL"
          git add documents/*.parquet
          git commit -m "Automated ETL processing" || echo "No changes to commit"
          git push
